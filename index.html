<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drivora - Premium Personal Mobility Professionals</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #d4af37;
            --primary-light: #e8c547;
            --dark-bg: #0a0e27;
            --dark-card: #1a1f3a;
            --dark-border: #2a3050;
            --light-bg: #f8f6f1;
            --light-card: #ffffff;
            --light-border: #e8e3d8;
            --text-dark: #ffffff;
            --text-light: #1a1a1a;
            --accent: #d4af37;
            --success: #4ade80;
            --warning: #f59e0b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-dark);
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow-x: hidden;
        }

        body.light-mode {
            background-color: var(--light-bg);
            color: var(--text-light);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            background: rgba(10, 14, 39, 0.8);
            border-bottom: 1px solid var(--dark-border);
            padding: 16px 0;
            transition: all 0.3s ease;
        }

        body.light-mode header {
            background: rgba(248, 246, 241, 0.95);
            border-bottom-color: var(--light-border);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .theme-toggle {
            width: 50px;
            height: 28px;
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 14px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            padding: 2px;
        }

        body.light-mode .theme-toggle {
            background: var(--light-card);
            border-color: var(--light-border);
        }

        .theme-toggle-circle {
            width: 24px;
            height: 24px;
            background: var(--primary);
            border-radius: 50%;
            transition: transform 0.3s ease;
        }

        .theme-toggle.active .theme-toggle-circle {
            transform: translateX(22px);
        }

        main {
            padding-top: 80px;
            padding-bottom: 100px;
        }

        .hero {
            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1), rgba(212, 175, 55, 0.05));
            text-align: center;
        }

        body.light-mode .hero {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.05), rgba(212, 175, 55, 0.02));
        }

        .hero h1 {
            font-size: clamp(32px, 8vw, 56px);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 24px;
            letter-spacing: -1px;
        }

        .hero p {
            font-size: 18px;
            opacity: 0.8;
            max-width: 600px;
            margin: 0 auto 40px;
            line-height: 1.6;
        }

        .cta-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: #000;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.3);
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn-secondary:hover {
            background: var(--primary);
            color: #000;
        }

        .btn-filter {
            padding: 8px 16px;
            border: 1px solid var(--dark-border);
            background: transparent;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            color: inherit;
        }

        body.light-mode .btn-filter {
            border-color: var(--light-border);
        }

        .btn-filter:hover,
        .btn-filter.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #000;
        }

        section {
            padding: 60px 20px;
            border-top: 1px solid var(--dark-border);
        }

        body.light-mode section {
            border-top-color: var(--light-border);
        }

        section h2 {
            font-size: clamp(28px, 6vw, 44px);
            font-weight: 700;
            margin-bottom: 40px;
            text-align: center;
        }

        .accent-text {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .filter-section {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 40px;
        }

        .professionals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 40px;
        }

        .professional-card {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        body.light-mode .professional-card {
            background: var(--light-card);
            border-color: var(--light-border);
        }

        .professional-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.2);
        }

        .professional-header {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }

        .professional-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            object-fit: cover;
            flex-shrink: 0;
        }

        .professional-info {
            flex: 1;
        }

        .professional-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .professional-rating {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .stars {
            display: flex;
            gap: 2px;
        }

        .star {
            color: var(--primary);
            font-size: 14px;
        }

        .rating-value {
            font-size: 14px;
            opacity: 0.7;
        }

        .verified-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: var(--success);
            background: rgba(74, 222, 128, 0.1);
            padding: 4px 8px;
            border-radius: 12px;
            margin-top: 4px;
        }

        .professional-bio {
            font-size: 14px;
            opacity: 0.7;
            line-height: 1.5;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--dark-border);
        }

        body.light-mode .professional-bio {
            border-bottom-color: var(--light-border);
        }

        .specializations {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 16px;
        }

        .spec-tag {
            font-size: 12px;
            padding: 4px 10px;
            background: var(--primary);
            color: #000;
            border-radius: 12px;
            font-weight: 500;
        }

        .professional-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--dark-border);
        }

        body.light-mode .professional-stats {
            border-bottom-color: var(--light-border);
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 2px;
        }

        .nps-score {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1), rgba(212, 175, 55, 0.05));
            border: 1px solid var(--primary);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nps-left {
            display: flex;
            flex-direction: column;
        }

        .nps-label {
            font-size: 11px;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .nps-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }

        .nps-status {
            font-size: 12px;
            font-weight: 600;
            color: var(--success);
        }

        .professional-price {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .price-label {
            font-size: 12px;
            opacity: 0.6;
        }

        .price-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }

        .book-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .book-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        .modal {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            top: 0;
            z-index: 300;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
            align-items: flex-end;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: var(--dark-card);
            width: 100%;
            max-height: 90vh;
            border-radius: 24px 24px 0 0;
            padding: 32px 20px;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        body.light-mode .modal-content {
            background: var(--light-card);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-close {
            float: right;
            font-size: 28px;
            cursor: pointer;
            background: none;
            border: none;
            color: inherit;
        }

        .modal-header {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
            clear: both;
        }

        .modal-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--primary);
            object-fit: cover;
            flex-shrink: 0;
        }

        .modal-info h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .modal-info .verified-badge {
            margin-top: 8px;
        }

        .modal-section {
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--dark-border);
        }

        body.light-mode .modal-section {
            border-bottom-color: var(--light-border);
        }

        .modal-section h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .modal-section p {
            opacity: 0.8;
            line-height: 1.6;
        }

        .experience-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .experience-item {
            background: var(--dark-bg);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        body.light-mode .experience-item {
            background: var(--light-bg);
        }

        .experience-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }

        .experience-label {
            font-size: 12px;
            opacity: 0.6;
            margin-top: 4px;
        }

        .floating-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            background: rgba(26, 31, 58, 0.95);
            border: 1px solid var(--dark-border);
            border-radius: 50px;
            padding: 12px 24px;
            backdrop-filter: blur(20px);
            display: flex;
            gap: 8px;
            transition: all 0.3s ease;
        }

        body.light-mode .floating-nav {
            background: rgba(255, 255, 255, 0.95);
            border-color: var(--light-border);
        }

        .nav-item {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            border: none;
            color: inherit;
            font-size: 20px;
        }

        .nav-item:hover {
            background: var(--primary);
            color: #000;
        }

        footer {
            background: var(--dark-card);
            border-top: 1px solid var(--dark-border);
            padding: 40px 20px;
            text-align: center;
            opacity: 0.8;
        }

        body.light-mode footer {
            background: var(--light-card);
            border-top-color: var(--light-border);
        }

        @media (max-width: 768px) {
            .professionals-grid {
                grid-template-columns: 1fr;
            }

            .filter-section {
                justify-content: flex-start;
                overflow-x: auto;
                padding-bottom: 8px;
            }

            .floating-nav {
                bottom: 10px;
                padding: 8px 16px;
                gap: 4px;
            }

            .nav-item {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }

            .modal-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .experience-grid {
                grid-template-columns: 1fr 1fr 1fr 1fr;
            }
        }
    </style>
</head>

    <div class="modal" id="professionalModal">

        let currentFilter = 'all';
        let selectedProfessional = null;

        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'light') {
            document.body.classList.add('light-mode');
            themeToggle.classList.add('active');
        }

        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            themeToggle.classList.toggle('active');
            const currentTheme = document.body.classList.contains('light-mode') ? 'light' : 'dark';
            localStorage.setItem('theme', currentTheme);
        });

        function filterProfessionals(filter) {
            currentFilter = filter;
            document.querySelectorAll('.btn-filter').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderProfessionals();
        }

        function getFilteredProfessionals() {
            return professionals.filter(p => {
                if (currentFilter === 'all') return true;
                if (currentFilter === 'available') return p.available;
                if (currentFilter === 'trusted') return p.npsScore >= 85;
                if (currentFilter === 'highway') return p.specializations.includes('Highway Specialist');
                if (currentFilter === 'night') return p.specializations.includes('Night Travel Expert');
                return true;
            });
        }

        function renderProfessionals() {
            const grid = document.getElementById('professionals-grid');
            const filtered = getFilteredProfessionals();

            grid.innerHTML = filtered.map(p => `
                <div class="professional-card" onclick="openProfessionalModal(${p.id})">
                    <div class="professional-header">
                        <img src="${p.avatar}" alt="${p.name}" class="professional-avatar">
                        <div class="professional-info">
                            <div class="professional-name">${p.name}</div>
                            <div class="professional-rating">
                                <div class="stars">${'⭐'.repeat(Math.floor(p.rating))}</div>
                                <span class="rating-value">${p.rating}</span>
                            </div>
                            <div class="verified-badge">✓ Verified Professional</div>
                            ${!p.available ? '<div style="color: #f59e0b; font-size: 12px; margin-top: 4px;">Currently Busy</div>' : ''}
                        </div>
                    </div>

                    <div class="professional-bio">"${p.bio}"</div>

                    <div class="specializations">
                        ${p.specializations.map(s => `<span class="spec-tag">${s}</span>`).join('')}
                    </div>

                    <div class="professional-stats">
                        <div class="stat">
                            <div class="stat-value">${p.trips}+</div>
                            <div class="stat-label">Journeys</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value">${p.experience}yr</div>
                            <div class="stat-label">Experience</div>
                        </div>
                    </div>

                    <div class="nps-score">
                        <div class="nps-left">
                            <div class="nps-label">Trust Score</div>
                            <div class="nps-value">+${p.npsScore}</div>
                        </div>
                        <div class="nps-status">${p.npsLabel}</div>
                    </div>

                    <div class="professional-price">
                        <span class="price-label">From</span>
                        <span class="price-value">₹${p.hourlyRate}/hr</span>
                    </div>

                    <button class="book-btn">View Profile</button>
                </div>
            `).join('');
        }

        function openProfessionalModal(id) {
            selectedProfessional = professionals.find(p => p.id === id);
            if (!selectedProfessional) return;

            const p = selectedProfessional;

            document.getElementById('modalHeader').innerHTML = `
                <img src="${p.avatar}" alt="${p.name}" class="modal-avatar">
                <div class="modal-info">
                    <h2>${p.name}</h2>
                    <div class="professional-rating">
                        <div class="stars">${'⭐'.repeat(Math.floor(p.rating))}</div>
                        <span class="rating-value">${p.rating}</span>
                    </div>
                    <div class="verified-badge">✓ Verified Professional</div>
                </div>
            `;

            document.getElementById('bioSection').innerHTML = `
                <h3>About</h3>
                <p>${p.bio}</p>
            `;

            document.getElementById('statsSection').innerHTML = `
                <h3>Performance Metrics</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;">
                    <div style="text-align: center; padding: 12px; background: var(--dark-bg); border-radius: 8px;">
                        <div style="font-size: 18px; font-weight: 700; color: var(--primary);">${p.trips}+</div>
                        <div style="font-size: 12px; opacity: 0.6; margin-top: 4px;">Journeys</div>
                    </div>
                    <div style="text-align: center; padding: 12px; background: var(--dark-bg); border-radius: 8px;">
                        <div style="font-size: 18px; font-weight: 700; color: var(--primary);">+${p.npsScore}</div>
                        <div style="font-size: 12px; opacity: 0.6; margin-top: 4px;">NPS Score</div>
                    </div>
                    <div style="text-align: center; padding: 12px; background: var(--dark-bg); border-radius: 8px;">
                        <div style="font-size: 18px; font-weight: 700; color: var(--primary);">${p.rating}</div>
                        <div style="font-size: 12px; opacity: 0.6; margin-top: 4px;">Rating</div>
                    </div>
                </div>
                <div style="margin-top: 12px; padding: 12px; background: rgba(212, 175, 55, 0.1); border-radius: 8px; border: 1px solid var(--primary);">
                    <div style="font-size: 14px; font-weight: 600; color: var(--primary);">${p.npsLabel}</div>
                    <div style="font-size: 12px; opacity: 0.7; margin-top: 4px;">Trust Status</div>
                </div>
            `;

            document.getElementById('experienceSection').innerHTML = `
                <h3>Experience Overview</h3>
                <div class="experience-grid">
                    <div class="experience-item">
                        <div class="experience-value">${p.kmDriven.toLocaleString()}+</div>
                        <div class="experience-label">Km Driven</div>
                    </div>
                    <div class="experience-item">
                        <div class="experience-value">${p.experience}</div>
                        <div class="experience-label">Years</div>
                    </div>
                    <div class="experience-item">
                        <div class="experience-value">${p.citiesCovered.length}</div>
                        <div class="experience-label">Cities</div>
                    </div>
                    <div class="experience-item">
                        <div class="experience-value">₹${p.hourlyRate}</div>
                        <div class="experience-label">Hourly Rate</div>
                    </div>
                </div>
                <div style="margin-top: 12px;">
                    <div style="font-size: 12px; opacity: 0.6; margin-bottom: 8px;">Cities Covered</div>
                    <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                        ${p.citiesCovered.map(city => `<span style="padding: 6px 12px; background: var(--primary); color: #000; border-radius: 16px; font-size: 12px; font-weight: 600;">${city}</span>`).join('')}
                    </div>
                </div>
            `;

            document.getElementById('specializationsSection').innerHTML = `
                <h3>Specializations</h3>
                <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                    ${p.specializations.map(s => `<span class="spec-tag">${s}</span>`).join('')}
                </div>
            `;

            document.getElementById('professionalModal').classList.add('active');
        }

        function closeProfessionalModal() {
            document.getElementById('professionalModal').classList.remove('active');
            selectedProfessional = null;
        }

        function bookProfessional() {
            if (selectedProfessional) {
                alert(`Booking request for ${selectedProfessional.name} initiated. You will receive a confirmation shortly.`);
                closeProfessionalModal();
            }
        }

        function scrollToExperts() {
            document.getElementById('professionals-section').scrollIntoView({ behavior: 'smooth' });
        }

        const navItems = [
            { icon: '🏠', action: () => window.scrollTo({top: 0, behavior: 'smooth'}) },
            { icon: '👥', action: scrollToExperts },
            { icon: '📅', action: () => alert('Booking feature coming soon') },
            { icon: '👤', action: () => alert('Profile feature coming soon') }
        ];

        const nav = document.getElementById('floatingNav');
        navItems.forEach((item) => {
            const btn = document.createElement('button');
            btn.className = 'nav-item';
            btn.innerHTML = item.icon;
            btn.onclick = item.action;
            nav.appendChild(btn);
        });

        document.getElementById('professionalModal').addEventListener('click', (e) => {
            if (e.target.id === 'professionalModal') {
                closeProfessionalModal();
            }
        });

        renderProfessionals();
    </script>
</body>
</html>
